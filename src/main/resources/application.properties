spring.application.name=codearena

# --- Persistence (Phase 4) ---
# A real database (JPA + PostgreSQL/H2) is introduced in Phase 4. Until then the
# DataSource and Hibernate auto-configuration are switched off so the app can
# start with no database running. The in-memory ProblemService backs the REST
# API for now.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# --- Security (Phase 6) ---
# Spring Security is configured permissively in config/SecurityConfig.java for
# Phase 2 so endpoints are reachable without authentication. Real JWT-based
# authentication arrives in Phase 6.

# --- Web server ---
server.port=8080
