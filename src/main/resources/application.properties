spring.application.name=codearena

# --- Persistence (Phase 4) ---
# Default profile uses an H2 in-memory database so the app runs with zero setup.
# To use PostgreSQL instead, run with: --spring.profiles.active=postgres
spring.datasource.url=jdbc:h2:mem:codearena;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/update the schema from the @Entity mappings.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Disable Open Session In View: keep the persistence context inside the service
# layer rather than holding it open for the whole web request (a recommended
# default that surfaces lazy-loading issues early instead of hiding them).
spring.jpa.open-in-view=false

# Browse the in-memory DB at http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:mem:codearena, user: sa, empty password)
spring.h2.console.enabled=true

# --- Security (Phase 6) ---
# Spring Security is configured permissively in config/SecurityConfig.java for
# now. Real JWT-based authentication arrives in Phase 6.

# --- Web server ---
server.port=8080
