# PostgreSQL profile.
#
# Activate it with one of:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=postgres
#   java -jar app.jar --spring.profiles.active=postgres
#   SPRING_PROFILES_ACTIVE=postgres java -jar app.jar
#
# Create the database first, e.g.:  createdb codearena
# These properties override the H2 defaults from application.properties.

spring.datasource.url=jdbc:postgresql://localhost:5432/codearena
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# The H2 console is meaningless against PostgreSQL.
spring.h2.console.enabled=false
